<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixMark - Copyright Protection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="app-header">
            <h1>PixMark</h1>
            <p>Digital Watermarking & Copyright Protection</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <div class="card-header">
                    <h2>🔒 Embed Watermark</h2>
                    <p class="subtitle">Secure your images with a hidden logo.</p>
                </div>

                <div class="input-group">
                    <label for="original">Original Image</label>
                    <input type="file" id="original" accept="image/*">
                </div>

                <div class="input-group">
                    <label for="logo">Logo / Watermark</label>
                    <input type="file" id="logo" accept="image/*">
                </div>

                <button class="primary-btn" onclick="embed()">Generate Watermark</button>

                <div id="embed_result" class="result-box"></div> 
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>🛡️ Verify Copyright</h2>
                    <p class="subtitle">Check an image for your hidden watermark.</p>
                </div>

                <div class="input-group">
                    <label for="suspect">Suspect Image</label>
                    <input type="file" id="suspect" accept="image/*">
                </div>

                <div class="input-group">
                    <label for="owner">Owner Share</label>
                    <input type="file" id="owner" accept="image/*">
                </div>

                <div class="input-group">
                    <label for="logo_verify">Original Logo</label>
                    <input type="file" id="logo_verify" accept="image/*">
                </div>

                <button class="primary-btn" onclick="verify()">Verify</button>

                <div id="verify_result" class="result-box"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
